name: CI

on:
  push:
    branches: [ main, fix-cache ]
  pull_request:
    branches: [ main, fix-cache ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-lint:
    name: Ubuntu Lint & Doxygen
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg/archives
            ${{ github.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: d87340acc46bdeda386037b38aca30136e667e47

      - name: Run Clang-Format Check
        shell: bash
        run: |
          git ls-files | grep -E '\.(cpp|h|hpp)$' | xargs clang-format --dry-run --Werror

      - name: Run Doxygen Validation
        uses: mattnotmitt/doxygen-action@v1.12.0
        with:
          doxyfile-path: './Doxyfile'
          working-directory: '.'

  windows-build-test:
    name: Windows Build & Test
    runs-on: windows-latest
    env:
      # Pin the binary cache to ONE explicit dir instead of the ambiguous default
      # (%LOCALAPPDATA%\vcpkg\archives, which depends on user/elevation). This is the
      # exact folder we cache below, so restored archives are guaranteed to be found.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-bincache
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # vcpkg errors out if this dir doesn't already exist, so create it before any build.
      - name: Create vcpkg binary cache dir
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\.vcpkg-bincache" | Out-Null

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ${{ github.workspace }}/vcpkg/downloads
          # run_id makes every run save a fresh cache; restore-keys pulls the newest prior one
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-
            ${{ runner.os }}-vcpkg-
      - name: Cache Chocolatey mingw
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: ${{ runner.os }}-choco-mingw-${{ hashFiles('packages.config') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: d87340acc46bdeda386037b38aca30136e667e47

      - name: Install toolchain & build (setupc.ps1)
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          .\scripts\setupc.ps1 -RepoRoot "${{ github.workspace }}" -CI

      # Diagnostic: after the build, the bin-cache should hold prebuilt .zip archives.
      # If this lists files, restores on the NEXT run will skip the SDL3/Catch2 rebuild.
      # If it's empty, vcpkg built the ports but wrote binaries somewhere else.
      - name: Inspect vcpkg binary cache
        if: always()
        shell: powershell
        run: |
          $dir = "${{ github.workspace }}\.vcpkg-bincache"
          $files = Get-ChildItem -Path $dir -Recurse -File -ErrorAction SilentlyContinue
          Write-Host "Binary cache: $($files.Count) file(s), $([math]::Round((($files | Measure-Object Length -Sum).Sum)/1MB,1)) MB total"
          $files | Select-Object -First 40 FullName, @{n='MB';e={[math]::Round($_.Length/1MB,2)}} | Format-Table -AutoSize

      - name: Propagate installed toolchain PATH
        shell: powershell
        run: |
          $machinePath = [Environment]::GetEnvironmentVariable('Path','Machine')
          $userPath    = [Environment]::GetEnvironmentVariable('Path','User')
          ($machinePath -split ';') + ($userPath -split ';') |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -Unique |
            Add-Content -Path $env:GITHUB_PATH

          # On a choco-cache hit, `choco install` skips mingw and never adds it to the
          # Machine PATH, so find gcc under the restored lib and put its dir on PATH.
          $gcc = Get-ChildItem 'C:\ProgramData\chocolatey\lib\mingw' -Recurse -Filter gcc.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($gcc) { Split-Path $gcc.FullName | Add-Content -Path $env:GITHUB_PATH }

      - name: Test (Debug)
        run: ctest --preset debug-test
        