name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-lint-build:
    name: Ubuntu Lint & Build
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite" # Cache already installed packages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: d87340acc46bdeda386037b38aca30136e667e47

      - name: Run Clang-Format Check
        shell: bash
        run: |
          git ls-files | grep -E '\\.(cpp|h|hpp)$' | xargs clang-format --dry-run --Werror
        continue-on-error: true

      - name: Run Doxygen Validation
        uses: mattnotmitt/doxygen-action@v1.12.0
        with:
          doxyfile-path: './Doxyfile'
          working-directory: '.'

  windows-build-test:
    name: Windows Build & Test
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache vcpkg (Windows)
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: d87340acc46bdeda386037b38aca30136e667e47

      - name: Generate run-env.ps1
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          .\\scripts\\setup.ps1 -CI

      - name: Source run-env.ps1
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          .\\scripts\\run-env.ps1

      - name: Configure Release (MSVC/Ninja)
        run: cmake --preset debug

      - name: Build Release (MSVC)
        run: cmake --build --preset debug-build

      - name: Test Release (MSVC)
        run: ctest --preset debug-test
